name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Playwright
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        run: cd apps/web && npx playwright install --with-deps chromium

      # Run
      - name: Start API server
        run: node apps/api/dist/index.js &
        env:
          DATABASE_PATH: /tmp/tarmak-e2e.db
          PORT: 4000
      - name: Wait for health
        run: timeout 30 bash -c 'until curl -sf http://localhost:4000/api/v1/health; do sleep 1; done'
      - name: Run E2E tests
        run: cd apps/web && npx playwright test
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
