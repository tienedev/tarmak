name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Frontend
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile
      - name: Build frontend
        run: cd frontend && pnpm build

      # Backend (rust-embed picks up frontend/dist)
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build backend
        run: cargo build --release -p kanwise

      # Playwright
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('frontend/pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      # Run
      - name: Start kanwise
        run: DATABASE_PATH=/tmp/cortx-e2e.db RATE_LIMIT_MAX=10000 ./target/release/kanwise &
      - name: Wait for health
        run: timeout 30 bash -c 'until curl -sf http://localhost:3001/api/v1/health; do sleep 1; done'
      - name: Run E2E tests
        run: cd frontend && npx playwright test
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
