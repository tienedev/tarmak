services:
  tarmak:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    volumes:
      - tarmak-data:/data
    environment:
      - PORT=${PORT:-4000}
      - DATABASE_PATH=/data/tarmak.db
      - RUST_LOG=info
      # IMPORTANT: Set this to your domain to avoid CORS errors.
      # - TARMAK_ALLOWED_ORIGINS=https://tarmak.dev

volumes:
  tarmak-data:
